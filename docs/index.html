<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>k-ant-daily · 내일 아침부터</title>
<style>
  :root { --fg: #0f172a; --muted: #64748b; --bg: #fff; --accent: #0f766e; --border: #e2e8f0; --card: #f8fafc; }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e2e8f0; --muted: #94a3b8; --bg: #0f172a; --accent: #5eead4; --border: #1e293b; --card: #1e293b; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    line-height: 1.6; font-size: 16px;
  }
  main { max-width: 560px; margin: 0 auto; padding: 96px 20px; text-align: center; }
  h1 { font-size: 28px; margin: 0 0 12px; letter-spacing: -0.01em; }
  p  { color: var(--muted); margin: 6px 0; font-size: 15px; }
  .badge {
    display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
    color: var(--accent); background: var(--card); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 999px; margin-bottom: 16px;
  }
  .hint { font-size: 13px; margin-top: 24px; }
  .hint a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<main>
  <div class="badge">k-ant-daily</div>
  <h1>☕ 내일 아침부터 다시 만나요</h1>
  <p>매일 평일 <strong>07:30 KST</strong>에 장전 브리핑이 발행됩니다.</p>
  <p>NXT 마감(20:10 KST) 후에는 같은 페이지에 예측 적중 리뷰가 덧씌워져요.</p>
  <p class="hint"><a href="archive.html">지난 브리핑 모두 보기</a></p>
</main>
</body>
</html>
