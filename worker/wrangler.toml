name = "k-ant-daily-quotes"
main = "src/index.js"
compatibility_date = "2024-10-01"

# Free plan — no custom domain needed. After `wrangler deploy` you'll get
# a URL like https://k-ant-daily-quotes.<your-subdomain>.workers.dev
#
# To change the subdomain (optional):
#   wrangler whoami       # shows your account id
#   Cloudflare dashboard → Workers & Pages → Settings → Subdomain

[observability]
enabled = true

# KV namespace backing the /feedback endpoint.
# (To re-create on a different Cloudflare account: `wrangler kv namespace create FEEDBACK`,
#  then replace the id below with the returned value.)
[[kv_namespaces]]
binding = "FEEDBACK"
id = "a46127f419094bb58cbff56ba8e07e0c"
