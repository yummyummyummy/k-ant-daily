name = "k-ant-daily-quotes"
main = "src/index.js"
compatibility_date = "2024-10-01"

# Free plan — no custom domain needed. After `wrangler deploy` you'll get
# a URL like https://k-ant-daily-quotes.<your-subdomain>.workers.dev
#
# To change the subdomain (optional):
#   wrangler whoami       # shows your account id
#   Cloudflare dashboard → Workers & Pages → Settings → Subdomain

[observability]
enabled = true

# To enable the /feedback endpoint, create a KV namespace and paste its id:
#   wrangler kv namespace create FEEDBACK
# Then uncomment the block below with the returned id, and `wrangler deploy`.
# Worker runs fine without this — /feedback just returns 503 until bound.
#
# [[kv_namespaces]]
# binding = "FEEDBACK"
# id = "PASTE_KV_NAMESPACE_ID_HERE"
