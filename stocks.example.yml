# Copy this to stocks.yml (which is gitignored) and edit with your own names/holdings.
#
# Schema notes:
#   - owners: 보유자 이름 배열. 한 종목을 여러 명이 공동 보유할 수 있음.
#   - overnight_proxy: 해당 종목과 상관관계 높은 해외 티커 배열 (yfinance 형식).
#     섹터별 권장:
#       반도체        → ["^SOX", "NVDA", "MU"]
#       바이오        → ["XBI", "IBB"]
#       방산          → ["ITA", "LMT", "RTX"]
#       배터리/정유   → ["XLE", "CL=F", "TSLA"]
#       전력          → ["GEV", "ETN", "XLU"]
#       플랜트/EPC   → ["XLE", "FLR"]
#       조선·산업재  → ["XLI", "DAC"]
#       엔터          → ["SPOT", "WMG"]
#       카지노/관광  → ["LVS", "WYNN", "MGM"]
#       자동차        → ["F", "GM", "STLA"]
#       인터넷/플랫폼 → ["META", "GOOGL", "^IXIC"]
#       코스닥 ETF   → ["^IXIC", "QQQ"]
#   - deep_dive: true 이면 아침 브리핑에서 WebSearch/WebFetch 로 심층 리서치 수행.
#     토큰 소비 큼 — 2~3개 정도로 제한 권장.
#   - keywords: deep_dive 리서치의 seed 키워드.

stocks:
  - code: "005930"
    name: "삼성전자"
    market: KOSPI
    owners: ["Alice"]
    overnight_proxy: ["^SOX", "NVDA", "MU"]

  - code: "000660"
    name: "SK하이닉스"
    market: KOSPI
    owners: ["Alice", "Bob"]
    overnight_proxy: ["^SOX", "NVDA", "MU"]

  # 바이오 종목 + 딥다이브 예시
  - code: "310210"
    name: "보로노이"
    market: KOSDAQ
    owners: ["Carol"]
    overnight_proxy: ["XBI"]
    deep_dive: true
    keywords:
      - "보로노이"
      - "Voronoi"
      - "kinase inhibitor"

  # ETF 예시
  - code: "233740"
    name: "KODEX 코스닥150 레버리지"
    market: KOSPI
    is_etf: true
    owners: ["Bob"]
    overnight_proxy: ["^IXIC", "QQQ"]
