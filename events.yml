# events.yml — 수동 큐레이션 캘린더 이벤트
#
# 자동 수집 이벤트 (ClinicalTrials.gov primary completion, DART 공시 등)
# 는 .tmp/events_*.json 으로 떨어지고 scripts/build_calendar.py 가 이 파일과 머지함.
# 여기에는 사람이 확인한 / 외부 API 로 못 잡는 이벤트만.
#
# Schema (필드)
#   date          (필수) YYYY-MM-DD. 다일 이벤트는 date_range 사용
#   date_range    [시작, 끝]  (date 와 둘 중 하나)
#   category      필수. macro | conference | holiday | earnings | ir | clinical | other
#   title         필수. 짧고 직관적인 제목
#   description   선택. 1~2줄 factual 부연
#   impact        선택. "보는 법" — 결과에 따른 시장/보유종목 영향 시나리오
#   related_codes 선택. 관련 보유종목 KRX 코드 배열
#   tags          선택. 검색/필터용
#   source        선택. 행사·기관 공식 링크 (보조)
#   search_term   선택. 종목 특정 이벤트의 "종목명 + 키워드" 네이버 뉴스 검색용 키워드
#                 (예: ASCO→"ASCO", Hot Chips→"HBM"). 상세 패널의 "📰 관련 뉴스" 링크 생성
#   importance    선택 1~3. 3=헤더에 강조
#   time          선택. "HH:MM" (KST) — 결과/발표가 나오는 시각. 지나면 UI가 "결과 집계 중" 표시
#   result        선택. 이벤트 종료 후 agent 가 채움:
#                   outcome: positive | negative | neutral | asexpected
#                   summary: "실제로 어떻게 나왔는지 1~2줄 (사실 + 시장 반응)"
#                   filled_at: "YYYY-MM-DD"

