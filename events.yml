  # ─── FOMC 정례회의 2026 ──────────────────────────────────────────
  # 둘째 날 14:00 ET 성명 발표 + Powell 기자회견.
  # 3/6/9/12월은 경제전망(SEP) + 점도표 동반.
  - date_range: ["2026-06-16", "2026-06-17"]
    category: "macro"
    title: "FOMC 정례회의 (성명·점도표)"
    description: "둘째 날 14:00 ET (한국 18일 03:00) 성명 발표 + Powell 기자회견 14:30 ET. 6월은 경제전망 (SEP) + 점도표 (Dot Plot) 동반."
    impact: |
      📁 보유 영향
      • 코스닥 바이오 (알테오젠·보로노이·에이비엘바이오 등) — 금리 민감도 최고. 점도표 인하 시사면 수혜, 지연 시사면 약세
      • SK하이닉스·한미반도체·현대차 — 달러 방향(환차익 vs IT 수요)으로 갈림
      • CPI(6/10)·고용(6/5) 합산 결과가 이 회의 분위기를 좌우
    source: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"
    importance: 3

  - date_range: ["2026-07-28", "2026-07-29"]
    category: "macro"
    title: "FOMC 정례회의 (성명)"
    description: "성명 발표 + Powell 기자회견. 7월은 경제전망/점도표 없음 (1월·4월·7월·10월은 일반 회의)."
    impact: |
      📁 보유 영향
      • 점도표 없는 일반 회의 — 6월 대비 변동성 작음
      • 코스닥 바이오 금리 민감도 / 반도체·현대차 환율 영향은 동일
    source: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"
    importance: 2

  - date_range: ["2026-09-15", "2026-09-16"]
    category: "macro"
    title: "FOMC 정례회의 (성명·점도표)"
    description: "9월은 경제전망(SEP) + 점도표 동반. 4분기 정책 방향 시그널."
    impact: |
      📁 보유 영향
      • 연내 추가 인하 확정 시점이라 변동성 큼. 코스닥 바이오 민감도 최고
      • 추석 연휴(9/24~) 직전 — 9/17(목) 한국 시초 갭으로 반영
    source: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"
    importance: 3

  - date_range: ["2026-10-27", "2026-10-28"]
    category: "macro"
    title: "FOMC 정례회의 (성명)"
    description: "10월은 일반 회의 (점도표 없음). 11월 미 중간선거 직전 — 정치적 중립 발언 톤 가능성."
    impact: |
      📁 보유 영향
      • 일반 회의 + 미 중간선거(11/3) 직전 → 변동성 평소보다 작을 가능성
      • 코스닥 바이오 / 반도체·현대차 민감도는 동일
    source: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"
    importance: 2

  - date_range: ["2026-12-08", "2026-12-09"]
    category: "macro"
    title: "FOMC 정례회의 (성명·점도표)"
    description: "12월은 경제전망(SEP) + 점도표 동반. 한 해 마지막 회의 + 2027년 정책 가이드라인 시그널."
