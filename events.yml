  - date: "2026-08-17"
    category: "holiday"
    title: "광복절 대체휴장 (월)"
    description: "8/15 광복절이 토요일이라 8/17(월) 대체휴장. 토일월 3일 연휴."
    impact: |
      📊 보는 법
      • 3일 휴장 동안 미국 시장이 크게 움직이면 화요일 (8/18) 한국 개장에 갭으로 반영
